name: Build Gemini Skill Browser Image

on:
  workflow_dispatch:
    inputs:
      browser_base_tag:
        description: "Browser base image tag for kasmweb/edge (for example: 1.18.0)"
        required: true
        default: "1.18.0"
      image_tag:
        description: "Optional published image tag; leave empty to follow browser_base_tag + -kasm"
        required: false
        default: ""
      gemini_skill_ref:
        description: "gemini-skill git ref to build"
        required: true
        default: "main"
      push_latest:
        description: "Also publish latest-kasm tag manually"
        required: true
        default: false
        type: boolean

concurrency:
  group: build-gemini-skill-browser-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPO: gemini-skill-browser
  DEFAULT_PLATFORM: linux/amd64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Normalize repository owner
        id: owner
        run: |
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "lower_owner=$LOWER_OWNER" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build parameters
        id: params
        run: |
          chmod +x gemini-skill-browser-builder/scripts/*.sh
          bash gemini-skill-browser-builder/scripts/resolve-build-params.sh \
            --image-repo "${IMAGE_REPO}" \
            --default-platform "${DEFAULT_PLATFORM}" \
            --browser-base-tag "${{ github.event.inputs.browser_base_tag }}" \
            --image-tag "${{ github.event.inputs.image_tag }}" \
            --gemini-skill-ref "${{ github.event.inputs.gemini_skill_ref || 'main' }}" \
            --push-latest "${{ github.event.inputs.push_latest == true && 'true' || 'false' }}" \
            --latest-tag "latest-kasm" \
            --github-output "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lower_owner }}/${{ steps.params.outputs.image_repo }}
          tags: ${{ steps.params.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Gemini Skill Browser
            org.opencontainers.image.description=Single-container kasmweb/edge based browser image for Gemini Skill
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.base.name=kasmweb/edge:${{ steps.params.outputs.browser_base_tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./gemini-skill-browser-builder/image
          file: ./gemini-skill-browser-builder/image/Dockerfile
          platforms: ${{ steps.params.outputs.platforms }}
          push: true
          build-args: |
            BASE_IMAGE_TAG=${{ steps.params.outputs.browser_base_tag }}
            GEMINI_SKILL_REF=${{ steps.params.outputs.gemini_skill_ref }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Emit build summary
        run: |
          {
            echo "## Gemini Skill Browser image build"
            echo ""
            echo "- Image: ghcr.io/${{ steps.owner.outputs.lower_owner }}/${{ steps.params.outputs.image_repo }}"
            echo "- Browser base tag: ${{ steps.params.outputs.browser_base_tag }}"
            echo "- Published image tag: ${{ steps.params.outputs.image_tag }}"
            echo "- Tags: ${{ steps.meta.outputs.tags }}"
            echo "- Platforms: ${{ steps.params.outputs.platforms }}"
            echo "- GEMINI_SKILL_REF: ${{ steps.params.outputs.gemini_skill_ref }}"
          } >> "$GITHUB_STEP_SUMMARY"
